version: "3.8"

services:

  aiops-backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - aiops-net

  # ─────────────────────────────────────────
  # OPTIONAL: serve the frontend via nginx
  # so you don't need to open index.html
  # manually from your filesystem.
  # Access at http://localhost:3001
  # ─────────────────────────────────────────
  aiops-frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - aiops-net

networks:
  aiops-net:
    driver: bridge