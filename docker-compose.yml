version: "3.8"

services:

  aiops-backend:
    build: ./backend
    ports:
      - "0.0.0.0:8080:8080"
    env_file:
      - ./backend/.env
    volumes:
      - cmdstan-cache:/root/.cmdstan   # persists cmdstan across rebuilds
    restart: unless-stopped
    networks:
      - aiops-net

  # ─────────────────────────────────────────
  # Serves the frontend via nginx
  # Access at http://YOUR_VM_IP:3001
  # ─────────────────────────────────────────
  aiops-frontend:
    image: nginx:alpine
    ports:
      - "0.0.0.0:3001:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - aiops-net

volumes:
  cmdstan-cache:

networks:
  aiops-net:
    driver: bridge